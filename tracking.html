<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>White Peak Restaurant | Application Tracking</title>

<link rel="stylesheet" href="tracking.css">

</head>


<body>


<header>

<div class="logo">
White Peak Restaurant
</div>


<nav>

<a href="index.html">Home</a>
<a href="jobs.html">Jobs</a>
<a href="tracking.html">Application Tracking</a>

</nav>


</header>





<section class="hero">

<div>

<h1>Application Tracking</h1>

<p>
Check your job application status anytime.
</p>

</div>

</section>






<section class="tracking-box">


<h2>Check Your Application</h2>


<input 
id="applicationID"
placeholder="Enter Application ID">


<input 
id="email"
placeholder="Enter Email Address">



<button onclick="checkStatus()">
Check Status
</button>



</section>







<section id="result" class="result">


<div class="status-card">


<h2 id="position"></h2>


<p>
Application ID:
<span id="appID"></span>
</p>


<p>
Date Applied:
<span id="date"></span>
</p>



<h3>
Application Status
</h3>



<div class="progress">


<div class="step active">
Submitted
</div>


<div class="step">
Under Review
</div>


<div class="step">
Shortlisted
</div>


<div class="step">
Interview
</div>


<div class="step">
Offer
</div>



</div>





<h3>
Documents
</h3>


<div id="documents">

</div>



</div>


</section>






<script src="tracking.js"></script>


</body>

</html>
